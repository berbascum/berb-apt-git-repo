Dir::ArchiveDir ".";
Dir::CacheDir ".";
TreeDefault::Directory "pool/";
TreeDefault::SrcDirectory "pool/";
Default::Packages::Extensions ".deb";
Default::Packages::Compress ". gzip bzip2";
Default::Sources::Compress ". gzip bzip2";
Default::Contents::Compress "gzip bzip2";

BinDirectory "dists/sid/main/binary-all" {
  Packages "dists/sid/main/binary-all/Packages";
  Contents "dists/sid/Contents-all";
};

BinDirectory "dists/sid/main/binary-amd64" {
  Packages "dists/sid/main/binary-amd64/Packages";
  Contents "dists/sid/Contents-amd64";
};

BinDirectory "dists/sid/main/binary-arm64" {
  Packages "dists/sid/main/binary-arm64/Packages";
  Contents "dists/sid/Contents-arm64";
};

Tree "dists/sid" {
  Sections "main";
  Architectures "all" "arm64" "amd64";
};
